apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ovh-mks-exporter.fullname" . }}
  labels:
    {{- include "ovh-mks-exporter.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ovh-mks-exporter.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "ovh-mks-exporter.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "ovh-mks-exporter.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: OVH_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: {{ include "ovh-mks-exporter.fullname" . }}
                  key: OVH_ENDPOINT
            - name: OVH_APPLICATION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ovh-mks-exporter.fullname" . }}
                  key: OVH_APPLICATION_KEY
            - name: OVH_APPLICATION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "ovh-mks-exporter.fullname" . }}
                  key: OVH_APPLICATION_SECRET
            - name: OVH_CONSUMER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ovh-mks-exporter.fullname" . }}
                  key: OVH_CONSUMER_KEY
            - name: OVH_CLOUD_PROJECT_SERVICE
              valueFrom:
                secretKeyRef:
                  name: {{ include "ovh-mks-exporter.fullname" . }}
                  key: OVH_CLOUD_PROJECT_SERVICE
            - name: OVH_MAX_RETRIES
              value: {{ .Values.config.maxRetries | quote }}
            {{- if .Values.config.s3Regions }}
            - name: OVH_S3_REGIONS
              value: {{ .Values.config.s3Regions | quote }}
            {{- end }}
            {{- if .Values.config.lbRegions }}
            - name: OVH_LB_REGIONS
              value: {{ .Values.config.lbRegions | quote }}
            {{- end }}
          ports:
            - name: http-metrics
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
