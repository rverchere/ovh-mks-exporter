name: Plumber

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write
  id-token: write   # required to publish the Plumber Score badge

jobs:
  plumber:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: getplumber/plumber@ef9864df81f444647d95889d98695434f6fa9732 # v0.4.12
        with:
          threshold: 60      # fail under a 60% Plumber Score
          score-push: true   # publishes a public Plumber Score badge
