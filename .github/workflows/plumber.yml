name: Plumber

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write
  id-token: write   # required to publish the Plumber Score badge

jobs:
  plumber:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: getplumber/plumber@fdd2a2d0555bb3b33cbb2efff3b955dea5a6bbf0 # v0.4.3
        with:
          threshold: 60      # fail under a 60% Plumber Score
          score-push: true   # publishes a public Plumber Score badge
